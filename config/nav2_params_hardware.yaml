# =============================================================================
# Nav2 Parameters — Real Hardware (LattePanda Alpha)
# =============================================================================
# Robot: Daniel's differential drive (130 RPM motors, 69mm wheels)
# Computer: LattePanda Alpha (Core i5) — more compute than Orange Pi 5
# LiDAR: RPLidar C1 via USB
#
# Key settings:
#   - use_sim_time: false everywhere
#   - Conservative velocities for real differential drive
#   - Tuned for RPLidar C1 characteristics
#   - Higher update frequencies (LattePanda has more CPU)
# =============================================================================

amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.2              # Motion model noise — higher for real diff drive
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.1
    base_frame_id: "base_link"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 8.0       # RPLidar C1 practical indoor
    laser_min_range: 0.15      # RPLidar C1 min range
    laser_model_type: "likelihood_field"
    max_beams: 60              # Reduced for compute
    max_particles: 3000        # LattePanda can handle more
    min_particles: 500
    odom_frame_id: "odom"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.1
    recovery_alpha_slow: 0.001
    resample_interval: 1
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 1.0    # More tolerance for real hardware
    update_min_a: 0.2
    update_min_d: 0.1
    z_hit: 0.7
    z_max: 0.05
    z_rand: 0.25
    z_short: 0.05
    scan_topic: scan
    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0

map_server:
  ros__parameters:
    use_sim_time: false

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 15.0    # Higher freq OK on LattePanda i5
    costmap_update_timeout: 0.50
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.5
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    use_realtime_priority: false

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.15  # [TUNING] Translational distance (m) robot must move within time limit.
                                       # 0.15m is small enough that even slow rotation+driving clears it.
                                       # Increase if robot falsely aborts when stuck. Decrease if robot
                                       # wastes time not actually progressing.
      movement_time_allowance: 20.0    # [TUNING] Seconds allowed to move required_movement_radius.
                                       # 20s gives time for: rotate in place (~3s) + coast settle (~1s)
                                       # + start driving + cover 0.15m at 0.07 m/s min speed (~2s).
                                       # Increase if robot needs more rotation time. Decrease to fail faster.

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.22         # [TUNING] 22cm — balanced between precision and preventing stalling
      yaw_goal_tolerance: 0.6         # [TUNING] ~34° — moderate heading tolerance

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.18        # [SPEED] Forward speed (m/s)
      lookahead_dist: 0.5             # Longer lookahead = smoother path tracking
      min_lookahead_dist: 0.35        # Raised: prevents too-sharp corrections
      max_lookahead_dist: 1.0
      lookahead_time: 2.0             # Longer: more anticipation
      rotate_to_heading_angular_vel: 0.3   # [SPEED][TURNING] Lower: duty-cycled rotation gives proportional control at 0.3
      rotate_to_heading_min_angle: 0.7     # [TURNING] ~40° — MUST exceed worst-case coast overshoot (35°=0.61 rad).
                                             # Below this: RPP uses curved path following. Above: in-place rotation.
                                             # If robot oscillates (360° spin) → increase toward 0.8-1.0.
                                             # If robot is sluggish to turn → decrease toward 0.6 (min safe: 0.62).
      transform_tolerance: 0.2
      use_velocity_scaled_lookahead_dist: true   # Scale lookahead with speed for smoother curves
      min_approach_linear_velocity: 0.05   # [SPEED] Higher than branch 1 — state machine duty-cycles below this
      approach_velocity_scaling_dist: 0.5  # [SPEED] Shorter approach zone, faster arrival
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.07  # Higher: keeps speed above duty-cycle threshold
      allow_reversing: false
      max_angular_accel: 0.8               # [SPEED][TURNING] Fast angular ramp — robot starts turning within 1 cycle (67ms)
                                             # instead of 15 cycles (1s) with the old 0.3 value.
                                             # Motor layer uses fixed PWM so accel doesn't affect physical momentum.
      max_robot_pose_search_dist: 10.0

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 10.0    # LattePanda can handle higher
    costmap_update_timeout: 2.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: true                  # A* more efficient than Dijkstra
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.2
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.3            # [SPEED] Recovery spin speed — lower for less coast overshoot
    min_rotational_vel: 0.15           # [SPEED] Min angular — duty cycling handles proportional sub-min speeds
    rotational_acc_lim: 0.3            # [SPEED] Gentle — reduces angular momentum buildup during recovery spins

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 10
    stop_on_failure: false
    action_server_result_timeout: 900.0
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 10.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.18, 0.0, 0.5]    # [SPEED] Max linear 0.18 m/s, angular 0.5 rad/s (state machine controls rotation)
    min_velocity: [-0.18, 0.0, -0.5]  # [SPEED] Reverse limits
    max_accel: [0.4, 0.0, 0.6]        # [SPEED] Gentle — state machine ramps handle smooth acceleration
    max_decel: [-0.6, 0.0, -0.8]      # [SPEED] Moderate deceleration
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.005, 0.0, 0.03] # [SMOOTH] Very low linear deadband, moderate angular
    velocity_timeout: 1.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      robot_radius: 0.15
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 8.0
          raytrace_min_range: 0.15
          obstacle_max_range: 7.0
          obstacle_min_range: 0.15
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0    # [NARROW] Higher = cost drops off faster near walls. Robot can squeeze through gaps.
                                     # Lower (2-3) = wider "soft" zone, avoids walls more. Higher (5-8) = narrower, braver.
        inflation_radius: 0.35       # [NARROW] Inflated zone radius (m). Must be > robot_radius (0.15m).
                                     # At 0.35: passages wider than 0.70m are fully navigable.
                                     # Increase if robot clips walls. Decrease if robot avoids passable gaps.
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 0.5         # Lower for compute savings
      global_frame: map
      robot_base_frame: base_link
      robot_radius: 0.15
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 8.0
          raytrace_min_range: 0.15
          obstacle_max_range: 7.0
          obstacle_min_range: 0.15
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0    # [NARROW] Match local costmap — faster cost drop-off near walls.
        inflation_radius: 0.35       # [NARROW] Match local costmap — allows planning through 0.70m+ gaps.
      always_send_full_costmap: true

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

# =============================================================================
# Jazzy-required nodes — collision_monitor, docking_server, route_server
# These must be configured for Nav2 lifecycle_manager to start properly.
# =============================================================================

collision_monitor:
  ros__parameters:
    use_sim_time: false
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.2
    source_timeout: 1.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    polygons: ["FootprintApproach"]
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 0.6    # [NARROW] Seconds to predicted collision before slowing. Lower = braver in tight spaces.
                                     # Was 1.2s — robot stopped 22cm (0.18m/s × 1.2s) before any obstacle.
                                     # At 0.6s: stops 11cm before obstacle. Still safe with 15cm robot radius.
                                     # If robot clips walls → increase to 0.8. If robot stops too early → decrease to 0.4.
      simulation_time_step: 0.1
      min_points: 4                  # [NARROW] Fewer laser points needed to trigger slowdown. Was 6.
                                     # In narrow gaps, only a few points hit each wall. Lower = more responsive.
      visualize: false
      enabled: true
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan"
      min_height: 0.05
      max_height: 0.5
      enabled: true

docking_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 50.0
    initial_perception_timeout: 5.0
    wait_charge_timeout: 5.0
    dock_approach_timeout: 30.0
    undock_linear_tolerance: 0.05
    undock_angular_tolerance: 0.1
    max_retries: 3
    base_frame: "base_link"
    fixed_frame: "odom"
    dock_backwards: false
    dock_prestaging_tolerance: 0.5
    dock_plugins: ['simple_charging_dock']
    simple_charging_dock:
      plugin: 'opennav_docking::SimpleChargingDock'
      docking_threshold: 0.05
      staging_x_offset: -0.7
      use_external_detection_pose: true
      use_battery_status: false
      use_stall_detection: false
      external_detection_timeout: 1.0
      external_detection_translation_x: -0.18
      external_detection_translation_y: 0.0
      external_detection_rotation_roll: -1.57
      external_detection_rotation_pitch: -1.57
      external_detection_rotation_yaw: 0.0
      filter_coef: 0.1
    controller:
      k_phi: 3.0
      k_delta: 2.0
      v_linear_min: 0.15
      v_linear_max: 0.15
      use_collision_detection: true
      costmap_topic: "local_costmap/costmap_raw"

route_server:
  ros__parameters:
    use_sim_time: false
    boundary_radius_to_achieve_node: 1.0
    radius_to_achieve_node: 2.0
    smooth_corners: true
    operations: ["AdjustSpeedLimit", "ReroutingService", "CollisionMonitor"]
    ReroutingService:
      plugin: "nav2_route::ReroutingService"
    AdjustSpeedLimit:
      plugin: "nav2_route::AdjustSpeedLimit"
    CollisionMonitor:
      plugin: "nav2_route::CollisionMonitor"
      max_collision_dist: 3.0
    edge_cost_functions: ["DistanceScorer", "CostmapScorer"]
    DistanceScorer:
      plugin: "nav2_route::DistanceScorer"
    CostmapScorer:
      plugin: "nav2_route::CostmapScorer"
